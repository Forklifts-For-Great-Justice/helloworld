version: "3.8"

services:
  helloworld:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - SERVER_PORT=8080
      - PROJECT_NAME=helloworld
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - hackfortress-internal
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 256M

networks:
  hackfortress-internal:
    external: true
